name: Build iOS IPA (Unsigned) v5

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install Capacitor 5.0.0 (compatible with iOS 13)
      run: |
        npm init -y
        npm install @capacitor/core@5.0.0 @capacitor/cli@5.0.0 @capacitor/ios@5.0.0
        npm install -g @capacitor/cli@5.0.0

    - name: Prepare web assets
      run: |
        mkdir -p www
        shopt -s extglob
        cp -r !(.git|.github|node_modules|www|ios) www/ 2>/dev/null || true

        if [ ! -f www/index.html ]; then
          HTML_FILE=$(find . -name "index.html" -not -path "./www/*" | head -1)
          if [ -n "$HTML_FILE" ]; then
            HTML_DIR=$(dirname "$HTML_FILE")
            cp -r "$HTML_DIR"/* www/
          else
            echo "ERRO: index.html não encontrado!"
            exit 1
          fi
        fi

        # Garante que capacitor.config.json está em www também (se ainda não estiver)
        if [ -f capacitor.config.json ]; then
          cp capacitor.config.json www/
        fi

        ls -la www/

    - name: Add iOS platform
      run: npx cap add ios

    - name: Set iOS deployment target to 13.0 in all places
      run: |
        cd ios/App
        # Altera deployment target no projeto Xcode (todas as ocorrências)
        sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9]*\.[0-9]*/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g' App.xcodeproj/project.pbxproj
        # Altera no Podfile
        if [ -f Podfile ]; then
          sed -i '' "s/platform :ios, '[0-9]*\.[0-9]*'/platform :ios, '13.0'/g" Podfile
        fi
        # Também ajusta os targets individuais do Podfile (caso existam)
        if [ -f Podfile ]; then
          sed -i '' "s/\(target '[^']*' do\)/\1\n  platform :ios, '13.0'/g" Podfile
        fi

    - name: Install CocoaPods dependencies (with fallback)
      run: |
        cd ios/App
        # Tenta instalar os pods
        pod install --repo-update || true
        # Verifica se o arquivo App.xcworkspace foi criado
        if [ ! -d App.xcworkspace ]; then
          echo "⚠️ pod install falhou, mas tentando build sem ele..."
          # Se falhou, cria um workspace mínimo
          mkdir -p App.xcworkspace
          cat > App.xcworkspace/contents.xcworkspacedata <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <Workspace version="1.0">
              <FileRef location="group:App.xcodeproj">
              </FileRef>
          </Workspace>
          EOF
        fi

    - name: Build unsigned IPA
      run: |
        cd ios/App
        # Tenta compilar com workspace, se existir; senão, compila o projeto diretamente
        if [ -d App.xcworkspace ]; then
          xcodebuild -workspace App.xcworkspace \
                     -scheme App \
                     -sdk iphoneos \
                     -configuration Release \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO
        else
          xcodebuild -project App.xcodeproj \
                     -scheme App \
                     -sdk iphoneos \
                     -configuration Release \
                     CODE_SIGN_IDENTITY="" \
                     CODE_SIGNING_REQUIRED=NO \
                     CODE_SIGNING_ALLOWED=NO
        fi
        # Empacota o .app em um IPA
        mkdir -p Payload
        cp -r build/Release-iphoneos/App.app Payload/
        zip -r AtlaxAI.ipa Payload
        mv AtlaxAI.ipa build/

    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: AtlaxAI-unsigned.ipa
        path: ios/App/build/AtlaxAI.ipa
