name: Build iOS IPA (Unsigned)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install Capacitor and dependencies
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/cli @capacitor/ios
        npm install -g @capacitor/cli

    - name: List repository contents (debug)
      run: |
        echo "Root contents:"
        ls -la
        echo "Subdirectories:"
        find . -maxdepth 2 -type f

    - name: Prepare web assets
      run: |
        mkdir -p www
        # Habilita padrões estendidos
        shopt -s extglob
        # Copia todos os arquivos e pastas, ignorando os desnecessários
        cp -r !(.git|.github|node_modules|www|ios) www/ 2>/dev/null || true

        # Verifica se index.html existe na raiz de www
        if [ ! -f www/index.html ]; then
          echo "index.html não encontrado na raiz de www. Procurando em subpastas..."
          # Encontra o primeiro index.html fora de www
          HTML_FILE=$(find . -name "index.html" -not -path "./www/*" | head -1)
          if [ -n "$HTML_FILE" ]; then
            HTML_DIR=$(dirname "$HTML_FILE")
            echo "Encontrado em $HTML_DIR, copiando conteúdo para www..."
            cp -r "$HTML_DIR"/* www/
          else
            echo "ERRO: index.html não encontrado em lugar nenhum!"
            exit 1
          fi
        fi

        # Confirma que agora existe
        if [ -f www/index.html ]; then
          echo "✓ index.html pronto em www/"
        else
          echo "ERRO: Falha ao preparar index.html."
          exit 1
        fi
        ls -la www/

    - name: Add iOS platform
      run: npx cap add ios

    - name: Build unsigned IPA
      run: |
        cd ios/App
        xcodebuild -workspace App.xcworkspace \
                   -scheme App \
                   -sdk iphoneos \
                   -configuration Release \
                   CODE_SIGN_IDENTITY="" \
                   CODE_SIGNING_REQUIRED=NO \
                   CODE_SIGNING_ALLOWED=NO
        # Empacota o .app em um IPA
        mkdir -p Payload
        cp -r build/Release-iphoneos/App.app Payload/
        zip -r AtlaxAI.ipa Payload
        mv AtlaxAI.ipa build/

    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: AtlaxAI-unsigned.ipa
        path: ios/App/build/AtlaxAI.ipa
