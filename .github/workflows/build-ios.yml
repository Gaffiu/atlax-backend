name: Build iOS IPA (Unsigned)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install Capacitor and dependencies
      run: |
        npm init -y
        npm install @capacitor/core @capacitor/cli @capacitor/ios
        npm install -g @capacitor/cli

    - name: Add iOS platform
      run: npx cap add ios

    - name: Build unsigned IPA
      run: |
        cd ios/App
        # Compila sem assinatura
        xcodebuild -workspace App.xcworkspace \
                   -scheme App \
                   -sdk iphoneos \
                   -configuration Release \
                   CODE_SIGN_IDENTITY="" \
                   CODE_SIGNING_REQUIRED=NO \
                   CODE_SIGNING_ALLOWED=NO
        # Cria a estrutura Payload e gera o IPA
        mkdir -p Payload
        cp -r build/Release-iphoneos/App.app Payload/
        zip -r AtlaxAI.ipa Payload
        mv AtlaxAI.ipa build/

    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: AtlaxAI-unsigned.ipa
        path: ios/App/build/AtlaxAI.ipa
