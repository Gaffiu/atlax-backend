name: Build iOS IPA (Unsigned) - Final Fix

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install Capacitor 5.0.0
      run: |
        npm init -y
        npm install @capacitor/core@5.0.0 @capacitor/cli@5.0.0 @capacitor/ios@5.0.0
        npm install -g @capacitor/cli@5.0.0

    - name: Prepare web assets in www
      run: |
        mkdir -p www
        shopt -s extglob
        cp -r !(.git|.github|node_modules|www|ios) www/ 2>/dev/null || true

        if [ ! -f www/index.html ]; then
          HTML_FILE=$(find . -name "index.html" -not -path "./www/*" | head -1)
          if [ -n "$HTML_FILE" ]; then
            HTML_DIR=$(dirname "$HTML_FILE")
            cp -r "$HTML_DIR"/* www/
          else
            echo "ERRO: index.html não encontrado!"
            exit 1
          fi
        fi

        # Garante capacitor.config.json em www (sem chave server)
        if [ -f capacitor.config.json ]; then
          cp capacitor.config.json www/
        fi

        echo "✅ Conteúdo final de www:"
        ls -laR www/

    - name: Add iOS platform and sync web assets
      run: |
        npx cap add ios
        npx cap sync ios

    - name: Verify that public folder is populated
      run: |
        echo "Verificando ios/App/App/public:"
        ls -laR ios/App/App/public/

    - name: Allow arbitrary loads (Firebase, fonts, APIs)
      run: |
        cd ios/App/App
        /usr/libexec/PlistBuddy -c "Add :NSAppTransportSecurity:NSAllowsArbitraryLoads bool true" Info.plist 2>/dev/null || true

    - name: Set iOS deployment target to 13.0
      run: |
        cd ios/App
        sed -i '' 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9]*\.[0-9]*/IPHONEOS_DEPLOYMENT_TARGET = 13.0/g' App.xcodeproj/project.pbxproj
        if [ -f Podfile ]; then
          sed -i '' "s/platform :ios, '[0-9]*\.[0-9]*'/platform :ios, '13.0'/g" Podfile
        fi

    - name: Install CocoaPods dependencies
      run: |
        cd ios/App
        pod install --repo-update

    - name: Build app with xcodebuild
      run: |
        cd ios/App
        xcodebuild -workspace App.xcworkspace \
                   -scheme App \
                   -sdk iphoneos \
                   -configuration Release \
                   -derivedDataPath build/DerivedData \
                   CODE_SIGN_IDENTITY="" \
                   CODE_SIGNING_REQUIRED=NO \
                   CODE_SIGNING_ALLOWED=NO

    - name: Locate and package IPA
      run: |
        APP_PATH=$(find ios/App/build/DerivedData -name "App.app" -type d | head -1)
        if [ -z "$APP_PATH" ]; then
          echo "ERRO: App.app não encontrado!"
          exit 1
        fi
        echo "App.app encontrado em: $APP_PATH"

        echo "Conteúdo da pasta public dentro do .app:"
        ls -la "$APP_PATH/public/" || echo "Pasta public não encontrada dentro do .app!"

        # Se a pasta public não existir, copie manualmente do projeto
        if [ ! -d "$APP_PATH/public" ]; then
          echo "Copiando public manualmente..."
          cp -r ios/App/App/public "$APP_PATH/public"
        fi

        mkdir -p Payload
        cp -r "$APP_PATH" Payload/
        zip -r AtlaxAI.ipa Payload
        mv AtlaxAI.ipa ios/App/build/

    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: AtlaxAI-unsigned.ipa
        path: ios/App/build/AtlaxAI.ipa
